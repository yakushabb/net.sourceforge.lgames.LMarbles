app-id: net.sourceforge.lgames.LMarbles
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: lmarbles
rename-icon: lmarbles
rename-desktop-file: lmarbles.desktop
rename-appdata-file: lmarbles.metainfo.xml
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  # LMarbles does not respect XDG base directories
  - --persist=.lmarbles
cleanup:
  - /share/man
modules:
  - shared-modules/SDL/sdl12-compat.json
  - shared-modules/SDL/SDL_mixer-1.2.12.json

  - name: lmarbles
    buildsystem: autotools
    post-install:
      - install -Dm644 lmarbles.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: archive
        url: http://downloads.sourceforge.net/sourceforge/lgames/lmarbles-1.1.1.tar.gz
        sha256: e82bae214b6426d21b89ca186171a4da26e2f7c468d5478a185135a0862cb1ab
      - type: file
        path: lmarbles.metainfo.xml
